input {
  tcp {
    port => 5000
    codec => json_lines
  }
}

filter {
  if [message] {
    json {
      source => "message"
      skip_on_invalid_json => true
    }
  }

  mutate {
    add_field => { "application" => "processflowpro" }
  }

  if [timestamp] {
    date {
      match => ["timestamp", "ISO8601"]
      target => "@timestamp"
      remove_field => ["timestamp"]
    }
  }

  mutate {
    remove_field => ["host", "port"]
  }
}

output {
  elasticsearch {
    hosts => ["${ELASTICSEARCH_HOSTS}"]
    index => "processflowpro-logs-%{+YYYY.MM.dd}"
  }

  stdout {
    codec => rubydebug
  }
}
