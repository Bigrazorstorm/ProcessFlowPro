---
apiVersion: v1
kind: Service
metadata:
  name: postgres-replica
  namespace: processflowpro
  labels:
    app: postgres-replica
spec:
  selector:
    app: postgres-replica
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
  type: ClusterIP

---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres-replica
  namespace: processflowpro
  labels:
    app: postgres-replica
spec:
  serviceName: postgres-replica
  replicas: 1
  selector:
    matchLabels:
      app: postgres-replica
  template:
    metadata:
      labels:
        app: postgres-replica
    spec:
      initContainers:
        - name: init-replica
          image: postgres:15-alpine
          command:
            - bash
            - -c
            - |
              if [ ! -s /var/lib/postgresql/data/PG_VERSION ]; then
                export PGPASSWORD=$POSTGRES_REPLICATION_PASSWORD
                pg_basebackup -h postgres -D /var/lib/postgresql/data -U replicator -v -P --wal-method=stream
                echo "primary_conninfo = 'host=postgres port=5432 user=replicator password=$POSTGRES_REPLICATION_PASSWORD'" >> /var/lib/postgresql/data/postgresql.conf
                touch /var/lib/postgresql/data/standby.signal
              fi
          env:
            - name: POSTGRES_REPLICATION_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: processflowpro-secret
                  key: POSTGRES_REPLICATION_PASSWORD
          volumeMounts:
            - name: postgres-replica-data
              mountPath: /var/lib/postgresql/data
      containers:
        - name: postgres-replica
          image: postgres:15-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              valueFrom:
                configMapKeyRef:
                  name: processflowpro-config
                  key: DATABASE_NAME
            - name: POSTGRES_USER
              valueFrom:
                configMapKeyRef:
                  name: processflowpro-config
                  key: DATABASE_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: processflowpro-secret
                  key: DATABASE_PASSWORD
            - name: POSTGRES_REPLICATION_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: processflowpro-secret
                  key: POSTGRES_REPLICATION_PASSWORD
          volumeMounts:
            - name: postgres-replica-data
              mountPath: /var/lib/postgresql/data
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "processflowpro"]
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "processflowpro"]
            initialDelaySeconds: 30
            periodSeconds: 30
  volumeClaimTemplates:
    - metadata:
        name: postgres-replica-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 10Gi
