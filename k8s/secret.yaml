# IMPORTANT: Replace placeholder values with real secrets before applying.
# Use `kubectl create secret generic` or a secrets manager (e.g. Vault, Sealed Secrets).
#
# Example:
#   kubectl create secret generic processflowpro-secrets \
#     --from-literal=DATABASE_PASSWORD='<your-db-password>' \
#     --from-literal=JWT_SECRET="$(openssl rand -base64 32)" \
#     --from-literal=JWT_REFRESH_SECRET="$(openssl rand -base64 32)" \
#     -n processflowpro
apiVersion: v1
kind: Secret
metadata:
  name: processflowpro-secrets
  namespace: processflowpro
type: Opaque
stringData:
  DATABASE_PASSWORD: "CHANGE_ME_IN_PRODUCTION"
  JWT_SECRET: "CHANGE_ME_IN_PRODUCTION"
  JWT_REFRESH_SECRET: "CHANGE_ME_IN_PRODUCTION"
