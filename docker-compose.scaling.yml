version: '3.8'

services:
  postgres-primary:
    image: postgres:15-alpine
    container_name: processflowpro-postgres-primary
    command: >
      postgres
      -c wal_level=replica
      -c max_wal_senders=3
      -c wal_keep_size=64
      -c hot_standby=on
    environment:
      POSTGRES_DB: processflowpro
      POSTGRES_USER: processflowpro
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_REPLICATION_USER: replicator
      POSTGRES_REPLICATION_PASSWORD: ${POSTGRES_REPLICATION_PASSWORD:-replicapass}
    volumes:
      - postgres_primary_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - db-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U processflowpro"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-replica:
    image: postgres:15-alpine
    container_name: processflowpro-postgres-replica
    environment:
      POSTGRES_DB: processflowpro
      POSTGRES_USER: processflowpro
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_REPLICA_FROM: postgres-primary
      PGPASSWORD: ${POSTGRES_REPLICATION_PASSWORD:-replicapass}
    volumes:
      - postgres_replica_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    depends_on:
      postgres-primary:
        condition: service_healthy
    command: >
      bash -c "
        if [ ! -s /var/lib/postgresql/data/PG_VERSION ]; then
          pg_basebackup -h postgres-primary -D /var/lib/postgresql/data -U replicator -v -P --wal-method=stream
          echo 'primary_conninfo = host=postgres-primary port=5432 user=replicator password=${POSTGRES_REPLICATION_PASSWORD:-replicapass}' >> /var/lib/postgresql/data/postgresql.conf
          touch /var/lib/postgresql/data/standby.signal
        fi
        postgres
      "
    networks:
      - db-network

  redis-master:
    image: redis:7-alpine
    container_name: processflowpro-redis-master
    command: redis-server --requirepass ${REDIS_PASSWORD:-redispass} --bind 0.0.0.0
    ports:
      - "6379:6379"
    volumes:
      - redis_master_data:/data
    networks:
      - redis-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redispass}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis-sentinel-1:
    image: redis:7-alpine
    container_name: processflowpro-redis-sentinel-1
    command: >
      sh -c "
        echo 'sentinel monitor mymaster redis-master 6379 2' > /tmp/sentinel.conf &&
        echo 'sentinel auth-pass mymaster ${REDIS_PASSWORD:-redispass}' >> /tmp/sentinel.conf &&
        echo 'sentinel down-after-milliseconds mymaster 5000' >> /tmp/sentinel.conf &&
        echo 'sentinel parallel-syncs mymaster 1' >> /tmp/sentinel.conf &&
        echo 'sentinel failover-timeout mymaster 10000' >> /tmp/sentinel.conf &&
        redis-sentinel /tmp/sentinel.conf
      "
    ports:
      - "26379:26379"
    depends_on:
      redis-master:
        condition: service_healthy
    networks:
      - redis-network

  redis-sentinel-2:
    image: redis:7-alpine
    container_name: processflowpro-redis-sentinel-2
    command: >
      sh -c "
        echo 'sentinel monitor mymaster redis-master 6379 2' > /tmp/sentinel.conf &&
        echo 'sentinel auth-pass mymaster ${REDIS_PASSWORD:-redispass}' >> /tmp/sentinel.conf &&
        echo 'sentinel down-after-milliseconds mymaster 5000' >> /tmp/sentinel.conf &&
        echo 'sentinel parallel-syncs mymaster 1' >> /tmp/sentinel.conf &&
        echo 'sentinel failover-timeout mymaster 10000' >> /tmp/sentinel.conf &&
        redis-sentinel /tmp/sentinel.conf
      "
    ports:
      - "26380:26379"
    depends_on:
      redis-master:
        condition: service_healthy
    networks:
      - redis-network

  redis-sentinel-3:
    image: redis:7-alpine
    container_name: processflowpro-redis-sentinel-3
    command: >
      sh -c "
        echo 'sentinel monitor mymaster redis-master 6379 2' > /tmp/sentinel.conf &&
        echo 'sentinel auth-pass mymaster ${REDIS_PASSWORD:-redispass}' >> /tmp/sentinel.conf &&
        echo 'sentinel down-after-milliseconds mymaster 5000' >> /tmp/sentinel.conf &&
        echo 'sentinel parallel-syncs mymaster 1' >> /tmp/sentinel.conf &&
        echo 'sentinel failover-timeout mymaster 10000' >> /tmp/sentinel.conf &&
        redis-sentinel /tmp/sentinel.conf
      "
    ports:
      - "26381:26379"
    depends_on:
      redis-master:
        condition: service_healthy
    networks:
      - redis-network

volumes:
  postgres_primary_data:
    driver: local
  postgres_replica_data:
    driver: local
  redis_master_data:
    driver: local

networks:
  db-network:
    driver: bridge
  redis-network:
    driver: bridge
